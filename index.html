  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      -webkit-tap-highlight-color: transparent;
    }
    html, body {
      width: 100%;
      min-height: 100vh;
      background: #0a0e17;
      color: #e6edf3;
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      overflow-x: hidden;
      -webkit-font-smoothing: antialiased;
    }
    #root {
      width: 100%;
      min-height: 100vh;
    }
    .rtx-loader {
      position: fixed;
      inset: 0;
      background: #0a0e17;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      z-index: 99999;
      gap: 20px;
    }
    .rtx-loader-logo {
      font-size: 60px;
      animation: bounce 1s infinite;
    }
    .rtx-loader-title {
      font-size: 32px;
      fontWeight: 900;
      background: linear-gradient(135deg, #ff8c00, #00d4ff);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      letter-spacing: 0.15em;
    }
    .rtx-loader-subtitle {
      font-size: 11px;
      color: #6e7681;
      letter-spacing: 0.2em;
      text-transform: uppercase;
    }
    @keyframes bounce {
      0%, 100% { transform: translateY(0); }
      50% { transform: translateY(-10px); }
    }
  </style>
</head>
<body>
  <div id="root">
    <div class="rtx-loader">
      <div class="rtx-loader-logo">🚀</div>
      <div class="rtx-loader-title">RTX</div>
      <div class="rtx-loader-subtitle">Real Trading eXpert • Pro Max</div>
    </div>
  </div>

<!DOCTYPE html>
<html lang="bn">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <meta name="theme-color" content="#0a0e17" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="description" content="RTX - Real Trading eXpert | Ultra Pro Max Signal System" />

  <title>RTX | Real Trading eXpert</title>

  <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Ctext y='.9em' font-size='90'%3E🚀%3C/text%3E%3C/svg%3E" />

  <!-- Telegram Web App Script -->
  <script src="https://telegram.org/js/telegram-web-app.js"></script>

  <!-- Preconnect for performance -->
  <link rel="preconnect" href="https://api.binance.com" />
  <link rel="preconnect" href="https://fapi.binance.com" />
  <link rel="preconnect" href="https://firestore.googleapis.com" />
  <link rel="preconnect" href="https://s.tradingview.com" />

  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      -webkit-tap-highlight-color: transparent;
      -webkit-touch-callout: none;
    }

    html, body {
      width: 100%;
      min-height: 100vh;
      background: #0a0e17;
      color: #e6edf3;
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      overflow-x: hidden;
      overscroll-behavior: none;
      -webkit-font-smoothing: antialiased;
      -moz-osx-font-smoothing: grayscale;
    }

    #root {
      width: 100%;
      min-height: 100vh;
    }

    /* Loading Screen */
    .rtx-loader {
      position: fixed;
      inset: 0;
      background: #0a0e17;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      z-index: 99999;
      gap: 20px;
    }

    .rtx-loader-logo {
      font-size: 60px;
      animation: bounce 1s infinite;
    }

    .rtx-loader-title {
      font-size: 28px;
      font-weight: 900;
      background: linear-gradient(135deg, #ff8c00, #00d4ff);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      letter-spacing: 0.1em;
    }

    .rtx-loader-subtitle {
      font-size: 11px;
      color: #6e7681;
      letter-spacing: 0.2em;
      text-transform: uppercase;
    }

    .rtx-loader-bar {
      width: 200px;
      height: 3px;
      background: #1a1f2e;
      border-radius: 2px;
      overflow: hidden;
      margin-top: 10px;
    }

    .rtx-loader-bar::after {
      content: '';
      display: block;
      width: 30%;
      height: 100%;
      background: linear-gradient(90deg, #ff8c00, #00d4ff);
      animation: loading 1.5s infinite;
      border-radius: 2px;
    }

    @keyframes bounce {
      0%, 100% { transform: translateY(0); }
      50% { transform: translateY(-10px); }
    }

    @keyframes loading {
      0% { transform: translateX(-100%); }
      100% { transform: translateX(400%); }
    }

    /* Scrollbar */
    ::-webkit-scrollbar { width: 6px; height: 6px; }
    ::-webkit-scrollbar-track { background: #0a0e17; }
    ::-webkit-scrollbar-thumb { background: #2b3139; border-radius: 3px; }
    ::-webkit-scrollbar-thumb:hover { background: #ff8c00; }

    /* Input fixes for iOS */
    input, button, textarea, select {
      font-family: inherit;
      -webkit-appearance: none;
      appearance: none;
    }

    input:focus, button:focus { outline: none; }

    /* Prevent text selection on buttons */
    button { user-select: none; }
  </style>
</head>
<body>
  <div id="root">
    <div class="rtx-loader">
      <div class="rtx-loader-logo">🚀</div>
      <div class="rtx-loader-title">RTX</div>
      <div class="rtx-loader-subtitle">Real Trading eXpert</div>
      <div class="rtx-loader-bar"></div>
    </div>
  </div>

  <script type="module" src="/src/main.jsx"></script>
</body>
    </html>
